# HardRok.com — Netlify configuration.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ---------------------------------------------------------------------------
# Canonical origin enforcement (SPEC.md §3): 301 http->https and
# non-www->www at the edge. Netlify serves both apex and www; these force
# every variant to https://www.hardrok.com.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "http://hardrok.com/*"
  to = "https://www.hardrok.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://hardrok.com/*"
  to = "https://www.hardrok.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.hardrok.com/*"
  to = "https://www.hardrok.com/:splat"
  status = 301
  force = true

